<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Valint Health — Healthcare staffing and workforce solutions. Get in touch with our team today." />
  <title>Valint Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0D2B4E;
      --teal:   #00A99D;
      --white:  #FFFFFF;
      --gray:   #F5F7FA;
      --muted:  #5A6A7A;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #E2E8F0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 40px;
      width: auto;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
    }

    .logo-name span { color: var(--teal); }

    .nav-cta {
      background: var(--teal);
      color: var(--white);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .nav-cta:hover { background: #007F75; }

    /* ── Hero ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      background: linear-gradient(160deg, #081E38 0%, #0D2B4E 50%, #0A4A44 100%);
    }

    .hero {
      text-align: center;
      max-width: 640px;
    }

    .hero img {
      height: 96px;
      width: auto;
      margin: 0 auto 32px;
      filter: brightness(0) invert(1);
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .hero h1 span { color: var(--teal); }

    .hero p {
      font-size: 17px;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .hero-btn {
      display: inline-block;
      background: var(--teal);
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .hero-btn:hover {
      background: #007F75;
      transform: translateY(-2px);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid #E2E8F0;
    }

    footer a {
      color: var(--teal);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      nav { padding: 16px 20px; }
      .logo-name { font-size: 17px; }
      main { padding: 60px 20px; }
      .hero img { height: 72px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="/" class="logo">
      <img src="logo.png" alt="Valint Health logo" />
      <span class="logo-name">Valint <span>Health</span></span>
    </a>
    <a href="mailto:info@valinthealth.com" class="nav-cta">Contact Us</a>
  </nav>

  <!-- Hero -->
  <main>
    <div class="hero">
      <img src="logo.png" alt="" aria-hidden="true" />
      <h1>Healthcare Staffing,<br /><span>Done Right</span></h1>
      <p>
        Valint Health connects exceptional healthcare professionals with
        leading facilities across the nation. We're here to build the teams
        that elevate patient care.
      </p>
      <a href="mailto:info@valinthealth.com" class="hero-btn">Get in Touch</a>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Valint Health &nbsp;·&nbsp; <a href="mailto:info@valinthealth.com">info@valinthealth.com</a></p>
  </footer>

</body>
</html>
